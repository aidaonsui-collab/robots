# Odyssey Founder NFT — mainnet publish record
#
# Published 2026-04-24 to Sui mainnet. Single shared Move type
# OdysseyFounderNFT so TradePort only indexes the collection once;
# every future agent's Founder NFT auto-appears under the same
# collection page.
#
# Two publish txs exist on mainnet. The first (0x9bc75c…) was
# compiled from a draft branch and has a unicode quirk in the
# Display template. It's abandoned — do NOT wire it into the
# frontend. The clean re-publish at 0xc8b561… below is the canonical
# package; all env vars + move-call targets should use this id.
#
# Shared objects (Registry, TransferPolicy) + owned caps (AdminCap,
# TransferPolicyCap, Publisher, Display, UpgradeCap) were all
# minted at init and won't change across future upgrades.
# ============================================================

